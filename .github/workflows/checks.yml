name: checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check Laravel code style
        run: >-
          vendor/bin/pint --test
          app bootstrap/app.php
          config/app.php config/auth.php config/cache.php config/database.php
          config/filesystems.php config/logging.php config/mail.php
          config/queue.php config/services.php config/session.php config/vote.php
          database routes tests

      - name: Run Laravel tests
        run: php artisan test

      - name: Validate approved electoral imports
        run: php artisan elections:import-candidacies data/import/catalogo_candidaturas_erm2026.csv --source-cycle=ERM2026 --dry-run --no-interaction

  mariadb:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: encuestas_test
          MARIADB_USER: encuestas
          MARIADB_PASSWORD: test-password
          MARIADB_ROOT_PASSWORD: root-test-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -proot-test-password"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_mysql
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run tests on MariaDB
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: encuestas_test
          DB_USERNAME: encuestas
          DB_PASSWORD: test-password
        run: php artisan test
