<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Encuestas Electorales — Sitio en construcción</title>
  <meta name="description" content="Estamos construyendo nuestro sitio. Muy pronto disponible." />
  <style>
    :root {
      --bg: #0b1220;
      --bg2: #111a2e;
      --accent: #3b82f6;
      --text: #e6edf7;
      --muted: #93a4bf;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(1200px 600px at 50% -10%, var(--bg2), var(--bg));
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 560px;
      width: 100%;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid rgba(59,130,246,.35);
      background: rgba(59,130,246,.08);
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 28px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
    h1 {
      font-size: clamp(28px, 6vw, 44px);
      line-height: 1.1;
      margin-bottom: 16px;
    }
    p {
      color: var(--muted);
      font-size: clamp(15px, 3.5vw, 18px);
      line-height: 1.6;
    }
    .footer {
      margin-top: 40px;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge"><span class="dot"></span> Próximamente</span>
    <h1>Sitio web en construcción</h1>
    <p>Estamos trabajando para traerte algo increíble. Muy pronto estará disponible.</p>
    <div class="footer">© <span id="year"></span> Encuestas Electorales</div>
  </main>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
