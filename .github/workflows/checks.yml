name: checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Keep full history available for any canvas-gemini fallback reads.
          # The checker now treats missing historical Canvas files as smoke
          # checks, but full history still preserves the optional git blob path.
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: JNE live seed validator
        run: node scripts/validate-jne-live-seed.js

      - name: PHP refactor regression check
        run: php scripts/check-refactor.php

      - name: BL-14 endpoint tests
        run: |
          set -e
          for f in \
            scripts/test-rate-limit.php \
            scripts/test-client-trust.php \
            scripts/test-district-whitelist.php \
            scripts/test-trust-score-not-exposed.php; do
            echo "=== $f ==="
            php "$f"
          done

      - name: JS data/content validators
        run: |
          set -e
          for f in scripts/validate-*.js; do
            echo "=== $f ==="
            node "$f"
          done
