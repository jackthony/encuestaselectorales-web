name: checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # check-refactor.php falls back to `git show <ref>:canvas-gemini/...`
          # for the now-deleted canvas-gemini/ prototypes it diffs each PHP
          # page against (readCanvasSource()). That commit is unreachable
          # under actions/checkout's default shallow clone, so the check
          # fails on every page with "cannot read canvas source" even though
          # nothing is actually broken. Full history keeps that ref resolvable.
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: PHP refactor regression check
        run: php scripts/check-refactor.php

      - name: JS data/content validators
        run: |
          set -e
          for f in scripts/validate-*.js; do
            echo "=== $f ==="
            node "$f"
          done
